name: On-demand tests

on:
  workflow_dispatch:
    inputs:
      suites:
        description: >-
          Suite selectors for test/runtests.jl (e.g. "contract",
          "roundtrip", "lite pilots"). Empty runs every suite.
        default: ""
      junacore_ref:
        description: JunaCore.jl branch or SHA to test against
        default: "main"
      deploy_pages:
        description: Redeploy GitHub Pages with the fresh evidence page
        type: boolean
        default: false
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read

concurrency:
  group: on-demand-tests
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out JunaCoreTests
        uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - uses: julia-actions/cache@v2

      - name: Install JunaCore.jl
        env:
          JUNACORE_REF: ${{ inputs.junacore_ref || 'main' }}
        run: >-
          julia --project=. -e '
          using Pkg;
          Pkg.add(url="https://github.com/GabrielARL/JunaCore.jl",
                  rev=ENV["JUNACORE_REF"]);
          Pkg.instantiate()'

      # Evidence is written to the untracked out/ directory so a stale
      # committed reports/evidence.json can never masquerade as this run's
      # results if the emitter crashes before writing.
      - name: Run suites and record evidence
        id: emit
        continue-on-error: true
        env:
          SUITES: ${{ inputs.suites }}
        run: julia --project=. tools/emit_evidence.jl --out out/evidence.json $SUITES

      - name: Verify Evidence page contract
        if: hashFiles('out/evidence.json') != ''
        run: python3 test/evidence_page_contract.py

      - name: Build Evidence page
        if: hashFiles('out/evidence.json') != ''
        run: >-
          python3 tools/build_evidence_page.py
          --registry test/runtests.jl
          --evidence out/evidence.json
          --out out/evidence.html

      - name: Write run summary
        if: hashFiles('out/evidence.json') != ''
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json
          run = json.load(open("out/evidence.json"))
          bad = sum(s["fails"] + s["errors"] for s in run["suites"])
          good = sum(s["passes"] for s in run["suites"])
          skipped = sum(s["broken"] for s in run["suites"])
          print(f"## Evidence: {len(run['suites'])} suites · "
                f"{good:,} passed · {bad} failed/errored · {skipped} skipped")
          print(f"commit {run['commit']} · julia {run['julia']} · "
                f"{run['generated_at']}\n")
          print("| suite | passed | failed | errored | skipped | seconds |")
          print("|---|---:|---:|---:|---:|---:|")
          for s in sorted(run["suites"],
                          key=lambda s: -(s["fails"] + s["errors"])):
              print(f"| {s['key']} | {s['passes']} | {s['fails']} | "
                    f"{s['errors']} | {s['broken']} | {s['seconds']:.1f} |")
          EOF

      - name: Upload evidence artifact
        if: hashFiles('out/evidence.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: |
            out/evidence.json
            out/evidence.html

      - name: Fail on test failures
        if: steps.emit.outcome != 'success'
        run: |
          echo "the evidence run failed; see the run summary and logs"
          exit 1

  deploy:
    needs: test
    # Deploy on nightly runs and explicit requests, including when suites
    # failed (the page must show failures) — but never when the test job was
    # cancelled or crashed before recording evidence (the artifact download
    # below fails closed in that case).
    if: >-
      (needs.test.result == 'success' || needs.test.result == 'failure') &&
      (github.event_name == 'schedule' || inputs.deploy_pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out JunaCoreTests
        uses: actions/checkout@v6

      - name: Download evidence artifact
        uses: actions/download-artifact@v4
        with:
          name: evidence
          path: out

      - name: Build static Explorer
        run: >-
          python3 tools/build_static_pages.py
          --source docs/test_symbol_explorer.html
          --out-dir _site

      - name: Build Evidence page
        run: >-
          python3 tools/build_evidence_page.py
          --registry test/runtests.jl
          --evidence out/evidence.json
          --out _site/evidence.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
